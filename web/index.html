<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>信息雷达</title>
    <link rel="stylesheet" href="/assets/styles.css?v=20260701-icons" />
  </head>
  <body>
    <div class="techBackdrop" aria-hidden="true">
      <canvas id="asciiMeshCanvas" class="asciiMeshCanvas"></canvas>
      <div class="backdropWash"></div>
    </div>

    <header class="topbar">
      <div class="topbarInner">
        <div class="brandLockup">
          <span class="brandMark" aria-hidden="true"></span>
          <div>
            <div class="brand">信息雷达</div>
            <div class="subtitle">要点与来源</div>
          </div>
        </div>
        <div class="reportControls">
          <select id="dateSelect" aria-label="选择日报日期"></select>
          <div id="morningTitle" class="morningTitle">晨报</div>
        </div>
        <label class="searchBox">
          <input id="searchInput" type="search" placeholder="搜索关键词、主题或来源" />
          <span aria-hidden="true"></span>
        </label>
      </div>
    </header>

    <nav class="categoryBar" aria-label="主题筛选">
      <div id="categoryTabs" class="categoryTabs"></div>
    </nav>

    <main class="layout" data-api="/api/reports/latest">
      <section class="content">
        <section class="overview dashboardPanel" aria-labelledby="overviewTitle">
          <div class="overviewCopy">
            <h1 id="overviewTitle">当日信号</h1>
            <p id="reportMeta">正在载入晨报...</p>
          </div>
          <div class="metricGrid" id="summaryChips"></div>
        </section>

        <section class="readerSection corePanel" aria-labelledby="coreTitle">
          <div class="sectionHeader">
            <div>
              <h2 id="coreTitle">重点判断</h2>
              <p>先看这些变化</p>
            </div>
          </div>
          <div class="coreList" id="coreList"></div>
          <div id="sectionEnd" class="sectionEnd"></div>
        </section>

        <section class="readerSection deepPanel" aria-labelledby="deepTitle">
          <div class="sectionHeader">
            <div>
              <h2 id="deepTitle">来源解读</h2>
              <p>每张卡对应一个来源</p>
            </div>
          </div>
          <div class="deepList" id="deepList"></div>
        </section>
      </section>

      <aside class="sideRail">
        <section class="railBlock pathBlock">
          <h2>阅读顺序</h2>
          <ol id="readingPath" class="pathList"></ol>
        </section>
        <section class="railBlock">
          <h2>处理统计</h2>
          <div id="runStats" class="runStats"></div>
        </section>
        <section class="railBlock">
          <h2>来源分布</h2>
          <div id="sourceList" class="sourceList"></div>
        </section>
      </aside>
    </main>

    <aside class="evidenceDrawer" id="evidenceDrawer" aria-hidden="true">
      <div class="drawerHeader">
        <div>
          <div class="drawerEyebrow">原始来源</div>
          <h2 id="drawerTitle">来源详情</h2>
        </div>
        <button id="closeDrawer" class="iconButton" type="button" aria-label="关闭证据">关闭</button>
      </div>
      <div id="drawerBody" class="drawerBody"></div>
    </aside>

    <script src="/assets/app.js?v=20260701-icons"></script>
  </body>
</html>
